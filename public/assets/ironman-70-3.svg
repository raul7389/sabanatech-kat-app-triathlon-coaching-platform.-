<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Head: r=14 → diameter 28 = 37% of body width 76 (matches original proportions) -->
  <circle cx="50" cy="14" r="14" fill="#E21F26"/>
  <!-- Body: x=12–88 (76 wide), y=33–97 (64 tall).
       V-notch from bottom rises to y=65 = exact midpoint (33 + 32).
       Left-leg x=12–36 (24), gap x=36–64 (28), right-leg x=64–88 (24). -->
  <path d="M12,33 L88,33 L88,97 L64,97 L50,65 L36,97 L12,97 Z" fill="#E21F26"/>
  <!-- 70.3 centered in solid zone y=33–65, center y=49 -->
  <text x="50" y="49"
        text-anchor="middle" dominant-baseline="middle"
        font-size="27" font-weight="900" fill="#FFFFFF"
        font-family="'Arial Black',Impact,Arial,sans-serif"
        letter-spacing="-0.5">70.3</text>
</svg>
